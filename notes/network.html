<html lang="ko"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>네트워크 | Technology Notes</title><link rel="stylesheet" href="/styles.css" /></head><body><header class="site-header"><nav class="nav"><a href="/">전체</a><a href="/notes/backend">백엔드</a><a href="/notes/infra">인프라</a><a href="/notes/spring">Spring</a></nav><section class="hero"><p class="eyebrow">Network</p><h1>네트워크</h1><p class="hero-copy">인터넷 통신, 프로토콜, 메시징 구조, 실시간 통신을 정리합니다.</p></section></header><main><section class="overview"><article><span>네트워크</span><h2>DNS란 무엇인가?</h2><p>도메인 이름을 IP 주소로 변환하는 계층형 분산 시스템입니다.</p><a href="/notes/dns">노트 보기</a></article><article><span>네트워크</span><h2>MQTT란 무엇인가?</h2><p>IoT 환경에 적합한 경량 Publish/Subscribe 메시징 프로토콜입니다.</p><a href="/notes/mqtt">노트 보기</a></article><article><span>실시간 통신</span><h2>WebSocket이란 무엇인가?</h2><p>하나의 TCP 연결에서 클라이언트와 서버가 양방향으로 실시간 메시지를 주고받는 프로토콜입니다.</p><a href="/notes/websocket">노트 보기</a></article></section></main></body></html>
